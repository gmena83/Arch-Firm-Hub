        clientPhone: { type: string }
        clientPostalAddress: { type: string }
        clientPhysicalAddress: { type: string }
      required: [projectId, clientPhone, clientPostalAddress, clientPhysicalAddress]

    ProjectStatusNoteUpdate:
      type: object
      description: Patch payload for the plain-language status sentence (English + Spanish).
      properties:
        currentStatusNote: { type: string }
        currentStatusNoteEs: { type: string }

    ProjectStatusNote:
      type: object
      description: Snapshot of the plain-language status sentence after update.
      properties:
        projectId: { type: string }
        currentStatusNote: { type: string }
        currentStatusNoteEs: { type: string }
      required: [projectId, currentStatusNote, currentStatusNoteEs]

    ProjectInvoice:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        number: { type: string }
        title: { type: string }
        titleEs: { type: string }
        total: { type: number }
        paid: { type: number }
        balance: { type: number }
