openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KONTi Design | Build Studio - Project Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Project management
  - name: documents
    description: Document management
  - name: materials
    description: Materials library
  - name: calculator
    description: Building cost calculator
  - name: weather
    description: Weather and site conditions
  - name: ai
    description: AI assistant
  - name: dashboard
    description: Dashboard summaries
  - name: leads
    description: Lead intake & discovery
  - name: contractors
    description: Contractor / vendor directory
  - name: audit
    description: Cross-project audit log (admin / superadmin only)
  - name: permits
    description: Phase 4 — Permit authorization & OGPE submission
  - name: construction
    description: Phase 5 — Construction cost-plus, inspections, milestones
  - name: engineers
    description: Structural engineer directory
  - name: pre-design
    description: Phase 2 — Pre-Design & Viability (checklist, structured variables, GAMMA, phase advance)
  - name: punchlist
    description: Phase punchlist — per-phase open items that gate phase advancement
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project (team/admin/superadmin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/tasks:
    get:
      operationId: getProjectTasks
      tags: [projects]
      summary: Get tasks for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectTask"

  /projects/{projectId}/weather:
    get:
      operationId: getProjectWeather
      tags: [weather]
      summary: Get weather status for a project site
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current weather and build suitability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherStatus"

  /projects/{projectId}/documents:
    get:
      operationId: getProjectDocuments
      tags: [documents]
      summary: Get documents for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: clientVisible
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createProjectDocument
      tags: [documents]
      summary: Register a document metadata row for a project (team/admin/superadmin or owning client)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentCreateRequest"
      responses:
        "201":
          description: Document metadata recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions (team role or owning client only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/documents/{documentId}:
    patch:
      operationId: updateProjectDocument
      tags: [documents]
      summary: Update document metadata (team/admin/superadmin) — toggles client visibility
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdateRequest"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions (team-only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project or document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/calculations:
    get:
      operationId: getProjectCalculations
      tags: [calculator]
      summary: Get material calculations for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Calculator entries and total
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculatorSummary"

  /projects/{projectId}/calculations/{lineId}:
    patch:
      operationId: updateProjectCalculationLine
      tags: [calculator]
      summary: Inline-edit a calculator line (quantity, base price, manual override)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: lineId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculatorLineUpdate"
      responses:
        "200":
          description: Updated calculator line with recomputed effective price and line total
          content:
            application/json:
              schema:
                type: object
                required: [entry]
                properties:
                  entry:
                    $ref: "#/components/schemas/CalculatorEntry"
        "400":
          description: Invalid input
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project or line not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/pre-design:
    get:
      operationId: getProjectPreDesign
      tags: [pre-design]
      summary: Get Phase-2 Pre-Design & Viability state for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Pre-design data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreDesignData"
        "403":
          description: Client cannot access this project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/checklist-toggle:
    post:
      operationId: toggleChecklistItem
      tags: [pre-design]
      summary: Update the status of a Pre-Design checklist item
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [itemId, status]
              properties:
                itemId: { type: string }
                status:
                  type: string
                  enum: [pending, in_progress, done]
      responses:
        "200":
          description: Updated checklist item
          content:
            application/json:
              schema:
                type: object
                required: [projectId, item]
                properties:
                  projectId: { type: string }
                  item: { $ref: "#/components/schemas/PreDesignChecklistItem" }
        "400":
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project, checklist, or item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/structured-variables:
    post:
      operationId: submitStructuredVariables
      tags: [pre-design]
      summary: Submit structured variables and compute the assisted budget range
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [squareMeters, zoningCode, projectType]
              properties:
                squareMeters:
                  type: number
                  minimum: 1
                  maximum: 100000
                zoningCode:
                  type: string
                  description: Format like R-3, C-2, etc.
                projectType:
                  type: string
                  enum: [residencial, comercial, mixto, contenedor]
      responses:
        "200":
          description: Saved structured variables and computed budget
          content:
            application/json:
              schema:
                type: object
                required: [projectId, structuredVariables, assistedBudgetRange]
                properties:
                  projectId: { type: string }
                  structuredVariables: { $ref: "#/components/schemas/StructuredVariables" }
                  assistedBudgetRange: { $ref: "#/components/schemas/AssistedBudgetRange" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/advance-phase:
    post:
      operationId: advanceProjectPhase
      tags: [pre-design]
      summary: Advance the project to the next canonical phase (client may only approve the consultation gate)
      description: |
        Refuses to advance when the current phase has any open punchlist items
        (status not in `done`/`waived`). In that case the response is a structured
        `PunchlistOpenError` with `error="punchlist_open"`, the open count, and
        the open items themselves so the client can render a targeted message.
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated project and the new phase identifier
          content:
            application/json:
              schema:
                type: object
                required: [project, advancedTo]
                properties:
                  project: { $ref: "#/components/schemas/Project" }
                  advancedTo: { type: string }
        "400":
          description: |
            Cannot advance. Either a generic validation error (e.g. already in
            final phase, client gate violation) or a structured `punchlist_open`
            payload describing the items blocking advancement.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PunchlistOpenError"
                  - $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Client cannot advance this project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/punchlist:
    get:
      operationId: listProjectPunchlist
      tags: [punchlist]
      summary: List punchlist items for a project phase
      description: |
        Returns the items recorded against the given phase (defaults to the
        project's current phase) along with rolled-up counts used by the UI to
        render progress.
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: phase
          in: query
          required: false
          description: Phase to read items for. Defaults to the project's current phase.
          schema: { type: string }
      responses:
        "200":
          description: Punchlist items and rolled-up counts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PunchlistResponse" }
        "403":
          description: Client cannot view this project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      operationId: createProjectPunchlistItem
      tags: [punchlist]
      summary: Add a punchlist item to a project phase (team/admin/superadmin)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePunchlistItemRequest" }
      responses:
        "201":
          description: Newly created item, with the project id it was attached to
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PunchlistItemMutationResponse" }
        "400":
          description: Validation error (missing/blank label, labelEs, or owner)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Caller cannot modify this project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/punchlist/{itemId}:
    patch:
      operationId: updateProjectPunchlistItem
      tags: [punchlist]
      summary: Edit the label, owner or due date of a punchlist item (team/admin/superadmin)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePunchlistItemRequest" }
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PunchlistItemMutationResponse" }
        "403":
          description: Caller cannot modify this project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project or item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    delete:
      operationId: deleteProjectPunchlistItem
      tags: [punchlist]
      summary: Remove a punchlist item from the project (team/admin/superadmin)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                type: object
                required: [projectId, removedId]
                properties:
                  projectId: { type: string }
                  removedId: { type: string }
        "403":
          description: Caller cannot modify this project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project or item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/punchlist/{itemId}/status:
    post:
      operationId: setProjectPunchlistItemStatus
      tags: [punchlist]
      summary: Change a punchlist item's status (team/admin/superadmin)
      description: |
        Transitions an item to `open`, `in_progress`, `done`, or `waived`.
        Waiving requires a `waiverReason` of at least 3 characters; it is
        recorded on the item and shown in the UI.
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePunchlistStatusRequest" }
      responses:
        "200":
          description: Updated item with its new status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PunchlistItemMutationResponse" }
        "400":
          description: Invalid status, or waiving without a justification
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Caller cannot modify this project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project or item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/decline-phase:
    post:
      operationId: declineProjectPhase
      tags: [pre-design]
      summary: Client declines to advance from the consultation gate (records reason and notifies team)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional free-text reason (truncated to 200 chars server-side)
      responses:
        "200":
          description: Project (unchanged phase) and the timestamp the decline was recorded
          content:
            application/json:
              schema:
                type: object
                required: [project, declinedAt]
                properties:
                  project: { $ref: "#/components/schemas/Project" }
                  declinedAt: { type: string }
        "400":
          description: Decline only available at the consultation gate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Client cannot decline this project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Project not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/gamma-report:
    post:
      operationId: generateGammaReport
      tags: [pre-design]
      summary: Generate (mock) a GAMMA presentation for the project and persist its URL
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Generated GAMMA report metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GammaReportResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /projects/{projectId}/design:
    get:
      operationId: getProjectDesign
      tags: [design]
      summary: Get Phase-3 design state for a project (sub-phases, deliverables)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Design state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesignStateResponse"

  /projects/{projectId}/design/deliverable:
    post:
      operationId: updateDesignDeliverable
      tags: [design]
      summary: Update status of a single design deliverable
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subPhase, deliverableId, status]
              properties:
                subPhase:
                  type: string
                  enum: [schematic_design, design_development, construction_documents]
                deliverableId: { type: string }
                status:
                  type: string
                  enum: [pending, in_progress, done]
      responses:
        "200": { description: Updated deliverable }

  /projects/{projectId}/design/advance-sub-phase:
    post:
      operationId: advanceDesignSubPhase
      tags: [design]
      summary: Advance project to the next design sub-phase (or to permits if CD complete)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: New design state and synced project phase
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  state: { $ref: "#/components/schemas/DesignState" }
                  project: { $ref: "#/components/schemas/Project" }

  /projects/{projectId}/proposals:
    get:
      operationId: getProjectProposals
      tags: [proposals]
      summary: List comparison-view proposals for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Proposals
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  proposals:
                    type: array
                    items: { $ref: "#/components/schemas/Proposal" }

  /projects/{projectId}/proposals/{proposalId}/approve:
    post:
      operationId: approveProposal
      tags: [proposals]
      summary: Client approves a proposal — auto-advances project to Permits
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: proposalId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Approved proposal and updated project
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  proposals:
                    type: array
                    items: { $ref: "#/components/schemas/Proposal" }
                  approved: { $ref: "#/components/schemas/Proposal" }
                  project: { $ref: "#/components/schemas/Project" }

  /projects/{projectId}/change-orders:
    get:
      operationId: getProjectChangeOrders
      tags: [change-orders]
      summary: List change orders + totals
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Change-order list and totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeOrderResponse"
    post:
      operationId: createChangeOrder
      tags: [change-orders]
      summary: Create a new change order (team / admin)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, amountDelta, scheduleImpactDays]
              properties:
                title: { type: string }
                titleEs: { type: string }
                description: { type: string }
                descriptionEs: { type: string }
                amountDelta: { type: number }
                scheduleImpactDays: { type: number }
                reason: { type: string }
                reasonEs: { type: string }
