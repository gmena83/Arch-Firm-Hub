            receipts:
              $ref: "#/components/schemas/CsvColumnMapping"
      required:
        - projectId
        - mappings

    PutCsvMappingRequest:
      type: object
      properties:
        mapping:
          $ref: "#/components/schemas/CsvColumnMapping"
      required:
        - mapping

    PutCsvMappingResponse:
      type: object
      properties:
