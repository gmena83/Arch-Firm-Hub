        - contactName
        - email
        - phone
        - createdAt
        - score
        - status

    LeadCreateRequest:
      type: object
      properties:
        source:
          type: string
          enum: [website, social, referral, media, events]
        projectType:
          type: string
          enum: [residencial, comercial, mixto, contenedor]
        location:
          type: string
        budgetRange:
          type: string
          enum: [under_150k, 150k_300k, 300k_500k, 500k_1m, over_1m]
        terrainStatus:
          type: string
          enum: [no_terrain, with_terrain, with_plans]
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        notes:
          type: string
        booking:
          $ref: "#/components/schemas/LeadBooking"
      required:
        - source
        - projectType
        - location
        - budgetRange
        - terrainStatus
        - contactName
        - email
        - phone

    LeadAcceptResponse:
      type: object
      properties:
        lead:
          $ref: "#/components/schemas/Lead"
        project:
          $ref: "#/components/schemas/Project"
        asanaGid:
          type: string
        asanaMessage:
          type: string
      required:
        - lead
        - project
        - asanaGid
        - asanaMessage

    Deliverable:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        labelEs: { type: string }
        owner: { type: string }
        status:
          type: string
          enum: [pending, in_progress, done]
        completedAt: { type: string }
      required: [id, label, labelEs, status]

    DesignSubPhaseState:
      type: object
      properties:
        deliverables:
          type: array
          items: { $ref: "#/components/schemas/Deliverable" }
        startedAt: { type: string }
        completedAt: { type: string }
      required: [deliverables]

    DesignState:
      type: object
      description: Phase-3 design model. `subPhases` is the deliverables map keyed by sub-phase.
      properties:
        currentSubPhase:
          type: string
          enum: [schematic_design, design_development, construction_documents, complete]
        subPhases:
          type: object
          properties:
            schematic_design: { $ref: "#/components/schemas/DesignSubPhaseState" }
            design_development: { $ref: "#/components/schemas/DesignSubPhaseState" }
            construction_documents: { $ref: "#/components/schemas/DesignSubPhaseState" }
      required: [currentSubPhase, subPhases]

    DesignStateResponse:
      type: object
      properties:
        projectId: { type: string }
        available: { type: boolean }
        isProjectInDesign: { type: boolean }
        state:
          oneOf:
            - $ref: "#/components/schemas/DesignState"
            - type: "null"
        subPhaseOrder:
          type: array
          items:
            type: string
            enum: [schematic_design, design_development, construction_documents]
        subPhaseLabels:
          type: object
          additionalProperties:
            type: object
            properties:
              en: { type: string }
              es: { type: string }
      required: [projectId, available, isProjectInDesign]

    Proposal:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        scenario:
          type: string
          enum: [economy, standard, premium]
        title: { type: string }
        titleEs: { type: string }
        summary: { type: string }
        summaryEs: { type: string }
        totalCost: { type: number }
        durationWeeks: { type: number }
        highlights:
          type: array
          items: { type: string }
        highlightsEs:
          type: array
          items: { type: string }
        status:
          type: string
          enum: [pending, approved, rejected]
        decidedBy: { type: string }
        decidedAt: { type: string }
      required: [id, projectId, scenario, title, totalCost, status]

    ChangeOrder:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        number: { type: string }
        title: { type: string }
        titleEs: { type: string }
        description: { type: string }
        descriptionEs: { type: string }
        amountDelta: { type: number }
        scheduleImpactDays: { type: number }
        reason: { type: string }
        reasonEs: { type: string }
        requestedBy: { type: string }
        requestedAt: { type: string }
        status:
          type: string
          enum: [pending, approved, rejected]
        decidedBy: { type: string }
        decidedAt: { type: string }
        decisionNote: { type: string }
        outsideOfScope:
          type: boolean
          description: True if the change adds work beyond the signed proposal scope.
      required: [id, projectId, number, title, amountDelta, scheduleImpactDays, status]

    ChangeOrderResponse:
      type: object
      properties:
        projectId: { type: string }
        changeOrders:
          type: array
          items: { $ref: "#/components/schemas/ChangeOrder" }
        totals:
          type: object
          properties:
            approvedDelta: { type: number }
            pendingDelta: { type: number }
            approvedDays: { type: number }
          required: [approvedDelta, pendingDelta, approvedDays]
      required: [projectId, changeOrders, totals]

    PermitAuthorization:
      type: object
      properties:
        status:
          type: string
          enum: [none, authorized]
        authorizedBy: { type: string }
        authorizedAt: { type: string }
        authorizedIpMock:
          type: string
          description: Captured (or mocked) IP address of the authorizing client for audit
        summaryAccepted: { type: boolean }
      required: [status, summaryAccepted]

    RequiredSignature:
      type: object
      properties:
        id: { type: string }
        formName: { type: string }
        formNameEs: { type: string }
        required: { type: boolean }
        signedBy: { type: string }
        signedAt: { type: string }
      required: [id, formName, formNameEs, required]

    PermitItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        nameEs: { type: string }
        agency: { type: string }
        responsible: { type: string }
        state:
          type: string
          enum: [not_submitted, submitted, in_review, revision_requested, approved]
        permitType:
          type: string
          description: |
            Top-level permit family used to group items in the Permits page UI.
            Items with no explicit type fall into "other". Stable order on the
            client is: structural → electrical → plumbing → mechanical →
            environmental → use → other.
          enum: [structural, electrical, plumbing, mechanical, environmental, use, other]
        lastUpdatedAt: { type: string }
        revisionNote: { type: string }
        revisionNoteEs: { type: string }
        estimatedTime: { type: string }
        estimatedTimeEs: { type: string }
        notes: { type: string }
        notesEs: { type: string }
      required: [id, name, nameEs, agency, responsible, state, estimatedTime, estimatedTimeEs, notes, notesEs]

    PermitsResponse:
      type: object
      properties:
        projectId: { type: string }
        authorization: { $ref: "#/components/schemas/PermitAuthorization" }
        requiredSignatures:
          type: array
          items: { $ref: "#/components/schemas/RequiredSignature" }
        permitItems:
          type: array
          items: { $ref: "#/components/schemas/PermitItem" }
        milestones:
          type: object
          properties:
            authorization: { type: boolean }
            signatures: { type: boolean }
            submission: { type: boolean }
            review: { type: boolean }
            approval: { type: boolean }
          required: [authorization, signatures, submission, review, approval]
        canSubmitToOgpe: { type: boolean }
        stateOrder:
          type: array
          items:
            type: string
            enum: [not_submitted, submitted, in_review, revision_requested, approved]
      required: [projectId, authorization, requiredSignatures, permitItems, milestones, canSubmitToOgpe]

    StructuralEngineer:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        firm: { type: string }
        email: { type: string }
        phone: { type: string }
        specialty: { type: string }
        specialtyEs: { type: string }
      required: [id, name, firm, email, phone, specialty, specialtyEs]

    NonBillableExpense:
      type: object
      properties:
        id: { type: string }
        date: { type: string, description: "ISO date YYYY-MM-DD." }
        category: { type: string }
        categoryEs: { type: string }
        description: { type: string }
        descriptionEs: { type: string }
        amount: { type: number }
        paidBy: { type: string }
      required: [id, date, category, categoryEs, description, descriptionEs, amount, paidBy]

    CostPlusBudget:
      type: object
      properties:
        projectId: { type: string }
        materialsCost: { type: number }
        laborCost: { type: number }
        subcontractorCost: { type: number }
        subtotal: { type: number }
        plusFeePercent: { type: number }
        plusFeeAmount: { type: number }
        finalTotal: { type: number }
        notes: { type: string }
        notesEs: { type: string }
        nonBillableExpenses:
          type: array
          items: { $ref: "#/components/schemas/NonBillableExpense" }
        nonBillableTotal: { type: number }
      required: [projectId, materialsCost, laborCost, subcontractorCost, subtotal, plusFeePercent, plusFeeAmount, finalTotal]

    Inspection:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        type:
          type: string
          enum: [foundation, framing, electrical, plumbing, final]
        title: { type: string }
        titleEs: { type: string }
        inspector: { type: string }
        scheduledDate: { type: string }
        completedDate: { type: string }
        status:
          type: string
          enum: [scheduled, passed, failed, re_inspect]
        notes: { type: string }
        notesEs: { type: string }
        reportSentTo: { type: string }
        reportSentToName: { type: string }
        reportSentAt: { type: string }
        reportSentNote: { type: string }
        reportDocumentUrl: { type: string }
        reportDocumentName: { type: string }
      required: [id, projectId, type, title, titleEs, inspector, scheduledDate, status]

    InspectionsResponse:
      type: object
      properties:
        projectId: { type: string }
        inspections:
          type: array
          items: { $ref: "#/components/schemas/Inspection" }
      required: [projectId, inspections]

    Milestone:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        key:
          type: string
          enum: [foundation, framing, roofing, mep, finishes, final]
        title: { type: string }
        titleEs: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        status:
          type: string
          enum: [completed, in_progress, upcoming]
      required: [id, projectId, key, title, titleEs, startDate, endDate, status]

    MilestonesResponse:
      type: object
      properties:
        projectId: { type: string }
        milestones:
          type: array
          items: { $ref: "#/components/schemas/Milestone" }
      required: [projectId, milestones]

    PreDesignChecklistItem:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        labelEs: { type: string }
        status:
          type: string
          enum: [pending, in_progress, done]
        assignee: { type: string }
        completedAt: { type: string }
      required: [id, label, labelEs, status, assignee]

    StructuredVariables:
      type: object
      properties:
        squareMeters: { type: number }
        zoningCode: { type: string }
        projectType:
          type: string
          enum: [residencial, comercial, mixto, contenedor]
        submittedAt: { type: string }
        submittedBy: { type: string }
      required: [squareMeters, zoningCode, projectType, submittedAt, submittedBy]

    AssistedBudgetRange:
      type: object
      properties:
        low: { type: number }
        mid: { type: number }
        high: { type: number }
        currency: { type: string }
        perSqMeterMid: { type: number }
      required: [low, mid, high, currency, perSqMeterMid]

    WeeklyReport:
      type: object
      properties:
        id: { type: string }
        weekStart: { type: string }
        weekEnd: { type: string }
        title: { type: string }
        titleEs: { type: string }
        url: { type: string }
      required: [id, weekStart, weekEnd, title, titleEs, url]

    ProjectActivity:
      type: object
      properties:
        id: { type: string }
        timestamp: { type: string }
        type: { type: string }
        actor: { type: string }
        description: { type: string }
        descriptionEs: { type: string }
      required: [id, timestamp, type, actor, description, descriptionEs]

    PreDesignData:
      type: object
      properties:
        projectId: { type: string }
        checklist:
          type: array
          items: { $ref: "#/components/schemas/PreDesignChecklistItem" }
        structuredVariables:
          oneOf:
            - $ref: "#/components/schemas/StructuredVariables"
            - type: "null"
        assistedBudgetRange:
          oneOf:
            - $ref: "#/components/schemas/AssistedBudgetRange"
            - type: "null"
        weeklyReports:
          type: array
          items: { $ref: "#/components/schemas/WeeklyReport" }
        activities:
          type: array
          items: { $ref: "#/components/schemas/ProjectActivity" }
      required: [projectId, checklist, structuredVariables, assistedBudgetRange, weeklyReports, activities]

    GammaReportResponse:
      type: object
      properties:
        projectId: { type: string }
        reportId: { type: string }
        gammaReportUrl: { type: string }
        url: { type: string }
        generatedAt: { type: string }
        generatedBy: { type: string }
        pages: { type: integer }
      required: [projectId, reportId, gammaReportUrl, url, generatedAt, generatedBy, pages]

    PunchlistItemStatus:
      type: string
      description: |
        Lifecycle states for a punchlist item. `done` and `waived` count as
        cleared for the purpose of advancing the project phase.
      enum: [open, in_progress, done, waived]

    PunchlistItem:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        phase:
          type: string
          description: Project phase the item belongs to (e.g. construction, completed)
        label: { type: string }
        labelEs: { type: string }
        owner: { type: string }
        dueDate:
          type: string
          description: ISO date (YYYY-MM-DD); omitted if no due date is set
        status: { $ref: "#/components/schemas/PunchlistItemStatus" }
        waiverReason:
          type: string
          description: Justification recorded when the item was waived
        completedAt:
          type: string
          description: ISO timestamp the item was marked done
        updatedAt: { type: string }
      required: [id, projectId, phase, label, labelEs, owner, status, updatedAt]

    PunchlistResponse:
      type: object
      properties:
        projectId: { type: string }
        phase: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/PunchlistItem" }
        openCount: { type: integer }
        totalCount: { type: integer }
        doneCount: { type: integer }
        waivedCount: { type: integer }
      required: [projectId, phase, items, openCount, totalCount, doneCount, waivedCount]

    PunchlistItemMutationResponse:
      type: object
      properties:
        projectId: { type: string }
        item: { $ref: "#/components/schemas/PunchlistItem" }
      required: [projectId, item]

    CreatePunchlistItemRequest:
      type: object
      properties:
        label:
          type: string
          description: English label (truncated to 200 chars server-side)
        labelEs:
          type: string
          description: Spanish label (truncated to 200 chars server-side)
        owner:
          type: string
          description: Person or subcontractor responsible (truncated to 100 chars)
        dueDate:
          type: string
          description: Optional ISO date (YYYY-MM-DD)
        phase:
          type: string
          description: Phase to attach the item to. Defaults to the project's current phase.
      required: [label, labelEs, owner]

    UpdatePunchlistItemRequest:
      type: object
      description: Partial update; only provided fields are written.
      properties:
        label: { type: string }
        labelEs: { type: string }
        owner: { type: string }
        dueDate:
          type: string
          description: ISO date (YYYY-MM-DD); pass empty string to clear

    UpdatePunchlistStatusRequest:
      type: object
      properties:
        status: { $ref: "#/components/schemas/PunchlistItemStatus" }
        waiverReason:
          type: string
          description: Required (≥3 chars) when status is `waived`. Ignored otherwise.
      required: [status]

    PunchlistOpenError:
      type: object
      description: |
        Returned by `POST /projects/{projectId}/advance-phase` with HTTP 400
        when the current phase still has unresolved punchlist items.
      properties:
        error:
          type: string
          enum: [punchlist_open]
        message:
          type: string
          description: Human-readable reason in English
        messageEs:
          type: string
          description: Human-readable reason in Spanish
        openCount: { type: integer }
        openItems:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              label: { type: string }
              labelEs: { type: string }
              status: { $ref: "#/components/schemas/PunchlistItemStatus" }
            required: [id, label, labelEs, status]
      required: [error, message, messageEs, openCount, openItems]
