openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KONTi Design | Build Studio - Project Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Project management
  - name: documents
    description: Document management
  - name: materials
    description: Materials library
  - name: calculator
    description: Building cost calculator
  - name: weather
    description: Weather and site conditions
  - name: ai
    description: AI assistant
  - name: dashboard
    description: Dashboard summaries
  - name: leads
    description: Lead intake & discovery
  - name: permits
    description: Phase 4 — Permit authorization & OGPE submission
  - name: construction
    description: Phase 5 — Construction cost-plus, inspections, milestones
  - name: engineers
    description: Structural engineer directory
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/tasks:
    get:
      operationId: getProjectTasks
      tags: [projects]
      summary: Get tasks for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectTask"

  /projects/{projectId}/weather:
    get:
      operationId: getProjectWeather
      tags: [weather]
      summary: Get weather status for a project site
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current weather and build suitability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherStatus"

  /projects/{projectId}/documents:
    get:
      operationId: getProjectDocuments
      tags: [documents]
      summary: Get documents for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: clientVisible
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /projects/{projectId}/calculations:
    get:
      operationId: getProjectCalculations
      tags: [calculator]
      summary: Get material calculations for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Calculator entries and total
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculatorSummary"

  /projects/{projectId}/design:
    get:
      operationId: getProjectDesign
      tags: [design]
      summary: Get Phase-3 design state for a project (sub-phases, deliverables)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Design state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesignStateResponse"

  /projects/{projectId}/design/deliverable:
    post:
      operationId: updateDesignDeliverable
      tags: [design]
      summary: Update status of a single design deliverable
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subPhase, deliverableId, status]
              properties:
                subPhase:
                  type: string
                  enum: [schematic_design, design_development, construction_documents]
                deliverableId: { type: string }
                status:
                  type: string
                  enum: [pending, in_progress, done]
      responses:
        "200": { description: Updated deliverable }

  /projects/{projectId}/design/advance-sub-phase:
    post:
      operationId: advanceDesignSubPhase
      tags: [design]
      summary: Advance project to the next design sub-phase (or to permits if CD complete)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: New design state and synced project phase
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  state: { $ref: "#/components/schemas/DesignState" }
                  project: { $ref: "#/components/schemas/Project" }

  /projects/{projectId}/proposals:
    get:
      operationId: getProjectProposals
      tags: [proposals]
      summary: List comparison-view proposals for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Proposals
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  proposals:
                    type: array
                    items: { $ref: "#/components/schemas/Proposal" }

  /projects/{projectId}/proposals/{proposalId}/approve:
    post:
      operationId: approveProposal
      tags: [proposals]
      summary: Client approves a proposal — auto-advances project to Permits
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: proposalId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Approved proposal and updated project
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  proposals:
                    type: array
                    items: { $ref: "#/components/schemas/Proposal" }
                  approved: { $ref: "#/components/schemas/Proposal" }
                  project: { $ref: "#/components/schemas/Project" }

  /projects/{projectId}/change-orders:
    get:
      operationId: getProjectChangeOrders
      tags: [change-orders]
      summary: List change orders + totals
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Change-order list and totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeOrderResponse"
    post:
      operationId: createChangeOrder
      tags: [change-orders]
      summary: Create a new change order (team / admin)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, amountDelta, scheduleImpactDays]
              properties:
                title: { type: string }
                titleEs: { type: string }
                description: { type: string }
                descriptionEs: { type: string }
                amountDelta: { type: number }
                scheduleImpactDays: { type: number }
                reason: { type: string }
                reasonEs: { type: string }
                outsideOfScope:
                  type: boolean
                  description: Flag indicating the work falls outside the signed proposal scope.
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  changeOrder: { $ref: "#/components/schemas/ChangeOrder" }

  /projects/{projectId}/change-orders/{coId}:
    patch:
      operationId: updateChangeOrder
      tags: [change-orders]
      summary: Edit a pending change order's fields (team / admin)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: coId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                titleEs: { type: string }
                description: { type: string }
                descriptionEs: { type: string }
                amountDelta: { type: number }
                scheduleImpactDays: { type: number }
                reason: { type: string }
                reasonEs: { type: string }
                outsideOfScope: { type: boolean }
      responses:
        "200":
          description: Updated change order
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  changeOrder: { $ref: "#/components/schemas/ChangeOrder" }
        "400": { description: Cannot edit a decided CO or no changes provided }
        "404": { description: CO not found }
    delete:
      operationId: deleteChangeOrder
      tags: [change-orders]
      summary: Delete a pending change order (team / admin)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: coId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Deleted }

  /projects/{projectId}/change-orders/{coId}/status:
    post:
      operationId: setChangeOrderStatus
      tags: [change-orders]
      summary: Architect / admin sets the change-order status (team-only)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
        - name: coId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, approved, rejected]
                note: { type: string }
      responses:
        "200":
          description: Updated change order
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  changeOrder: { $ref: "#/components/schemas/ChangeOrder" }

  /structural-engineers:
    get:
      operationId: listStructuralEngineers
      tags: [engineers]
      summary: List structural engineers (directory)
      responses:
        "200":
          description: List of engineers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StructuralEngineer" }

  /projects/{id}/cost-plus:
    get:
      operationId: getProjectCostPlus
      tags: [construction]
      summary: Get the Cost-Plus budget breakdown for a project
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Cost-plus budget
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostPlusBudget" }
        "404": { description: Not found }

  /projects/{id}/inspections:
    get:
      operationId: getProjectInspections
      tags: [construction]
      summary: List inspections for a project
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Inspections
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InspectionsResponse" }
    post:
      operationId: createInspection
      tags: [construction]
      summary: Schedule a new inspection (admin/architect)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, title, titleEs, inspector, scheduledDate]
              properties:
                type:
                  type: string
                  enum: [foundation, framing, electrical, plumbing, final]
                title: { type: string }
                titleEs: { type: string }
                inspector: { type: string }
                scheduledDate: { type: string }
                completedDate: { type: string }
                status:
                  type: string
                  enum: [scheduled, passed, failed, re_inspect]
                notes: { type: string }
                notesEs: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  inspection: { $ref: "#/components/schemas/Inspection" }

  /projects/{id}/inspections/{insId}:
    get:
      operationId: getInspection
      tags: [construction]
      summary: Get a single inspection with its report metadata
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: insId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Inspection
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  inspection: { $ref: "#/components/schemas/Inspection" }
    patch:
      operationId: updateInspection
      tags: [construction]
      summary: Update an inspection (admin/architect)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: insId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                titleEs: { type: string }
                inspector: { type: string }
                scheduledDate: { type: string }
                completedDate: { type: string }
                status:
                  type: string
                  enum: [scheduled, passed, failed, re_inspect]
                notes: { type: string }
                notesEs: { type: string }
                reportDocumentUrl: { type: string }
                reportDocumentName: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  inspection: { $ref: "#/components/schemas/Inspection" }

  /projects/{id}/inspections/{insId}/send-report:
    post:
      operationId: sendInspectionReport
      tags: [construction]
      summary: Send the inspection report to a structural engineer (admin/architect)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: insId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [engineerId]
              properties:
                engineerId: { type: string }
                note: { type: string }
      responses:
        "200":
          description: Report sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  inspection: { $ref: "#/components/schemas/Inspection" }

  /projects/{id}/milestones:
    get:
      operationId: getProjectMilestones
      tags: [construction]
      summary: Get the construction milestones timeline for a project
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Milestones
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MilestonesResponse" }

  /projects/{id}/milestones/{milestoneId}:
    patch:
      operationId: updateMilestone
      tags: [construction]
      summary: Update a milestone status / dates (admin/architect)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: milestoneId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [completed, in_progress, upcoming]
                startDate: { type: string }
                endDate: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  milestone: { $ref: "#/components/schemas/Milestone" }

  /projects/{id}/permits:
    get:
      operationId: getProjectPermits
      tags: [permits]
      summary: Get Phase-4 permit authorization, signatures, items, and milestones
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Permits state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermitsResponse"

  /projects/{id}/authorize-permits:
    post:
      operationId: authorizePermits
      tags: [permits]
      summary: Client authorizes the OGPE submission packet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Authorization recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  authorization: { $ref: "#/components/schemas/PermitAuthorization" }
                required: [projectId, authorization]

  /projects/{id}/sign/{signatureId}:
    post:
      operationId: signPermitForm
      tags: [permits]
      summary: Client provides a typed-name signature on a required permit form
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: signatureId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signatureName]
              properties:
                signatureName: { type: string }
      responses:
        "200":
          description: Signed
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  signature: { $ref: "#/components/schemas/RequiredSignature" }
                required: [projectId, signature]

  /projects/{id}/permit-items/submit-to-ogpe:
    post:
      operationId: submitPermitsToOgpe
      tags: [permits]
      summary: Admin/architect submits the permit packet to OGPE (transitions not_submitted → submitted)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  permitItems:
                    type: array
                    items: { $ref: "#/components/schemas/PermitItem" }
                  submittedCount: { type: integer }
                required: [projectId, permitItems, submittedCount]

  /projects/{id}/permit-items/{itemId}/state:
    post:
      operationId: setPermitItemState
      tags: [permits]
      summary: Admin/architect transitions a permit item state (with optional revision note)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state:
                  type: string
                  enum: [not_submitted, submitted, in_review, revision_requested, approved]
                revisionNote: { type: string }
                revisionNoteEs: { type: string }
      responses:
        "200":
          description: Updated permit item; project may auto-advance to construction
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  permitItem: { $ref: "#/components/schemas/PermitItem" }
                  project: { $ref: "#/components/schemas/Project" }
                  advancedToConstruction: { type: boolean }
                required: [projectId, permitItem, project, advancedToConstruction]

  /projects/{id}/pdf:
    post:
      operationId: exportProjectPdf
      tags: [projects]
      summary: Export project report as PDF
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Project not found
        "501":
          description: PDF export not configured

  /materials:
    get:
      operationId: listMaterials
      tags: [materials]
      summary: List materials library
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"

  /materials/prices/refresh:
    post:
      operationId: refreshMaterialPrices
      tags: [materials]
      summary: Refresh material prices using Perplexity AI
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Updated prices for materials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialPriceRefreshResponse"
        "501":
          description: Perplexity not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Perplexity API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads (sorted by score desc)
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Submit a new public lead from the intake form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadCreateRequest"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/accept:
    post:
      operationId: acceptLead
      tags: [leads]
      summary: Accept a lead and create a Discovery-phase project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadAcceptResponse"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/chat:
    post:
      operationId: sendChatMessage
      tags: [ai]
      summary: Send a message to the AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
