        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/ContractorCreateRequest"
                - $ref: "#/components/schemas/ContractorBulkCreateRequest"
      responses:
        "201":
          description: Contractors created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractorBulkCreateResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /contractors/{id}:
    delete:
      operationId: deleteContractor
      tags: [contractors]
      summary: Remove a contractor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contractor removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contractor"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Contractor not found

  /audit:
    get:
      operationId: getAuditLog
      tags: [audit]
      summary: Cross-project audit log (admin / superadmin only)
      description: Returns recent audit entries with optional filtering by project, actor (substring match), entity, and date range. Capped at 1000 entries per request.
      parameters:
        - in: query
          name: projectId
          required: false
          schema: { type: string }
          description: Restrict to a single project.
        - in: query
          name: actor
          required: false
          schema: { type: string }
          description: Case-insensitive substring match against actor name.
        - in: query
          name: entity
          required: false
          schema: { type: string }
          description: Restrict to a single entity bucket (project, document, contractor, permit, calculator, …).
        - in: query
          name: from
          required: false
          schema: { type: string }
          description: ISO date or date-time. Lower bound (inclusive).
        - in: query
          name: to
          required: false
          schema: { type: string }
          description: ISO date or date-time. Upper bound (inclusive — bare dates cover the whole day).
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 1000 }
          description: Max entries to return (default 200).
      responses:
        "200":
          description: Audit log page with filter metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditLogResponse" }
        "401":
          description: Authentication required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Admin / superadmin only
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /ai/chat:
    post:
      operationId: sendChatMessage
      tags: [ai]
      summary: Send a message to the AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
